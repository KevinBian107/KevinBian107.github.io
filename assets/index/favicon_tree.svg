<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">

  <rect x="4" y="4" width="120" height="120" rx="28" fill="#111111"/>

  <!-- All edges use slope ≈ dx:dy of 0.6–0.8, consistent diagonal angle -->

  <!-- Trunk -->
  <line x1="64" y1="10" x2="64" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- Level 1: dx=20, dy=16, slope=1.25 — wide root split -->
  <line x1="64" y1="20" x2="44" y2="36" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="20" x2="84" y2="36" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Level 2 from left: dx=12, dy=16, slope=0.75 -->
  <line x1="44" y1="36" x2="32" y2="52" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="36" x2="56" y2="52" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- Level 2 from right: dx=12, dy=16, slope=0.75 -->
  <line x1="84" y1="36" x2="72" y2="52" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="84" y1="36" x2="96" y2="52" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Level 3 from 32: dx=10, dy=16, slope=0.625 -->
  <line x1="32" y1="52" x2="22" y2="68" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="42" y2="68" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>

  <!-- Level 3 from 56: dx=8, dy=16, slope=0.5 — single child -->
  <line x1="56" y1="52" x2="48" y2="68" stroke="#fff" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

  <!-- Level 3 from 72: dx=8, dy=16, slope=0.5 -->
  <line x1="72" y1="52" x2="64" y2="68" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="72" y1="52" x2="80" y2="68" stroke="#fff" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

  <!-- Level 3 from 96: dx=8, dy=16, slope=0.5 -->
  <line x1="96" y1="52" x2="88" y2="68" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="96" y1="52" x2="106" y2="68" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

  <!-- Level 4 from 22 (deep left): dx=8, dy=14, slope=0.57 -->
  <line x1="22" y1="68" x2="14" y2="82" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="68" x2="30" y2="82" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Level 4 from 42: dx=6, dy=14, slope=0.43 — single child -->
  <line x1="42" y1="68" x2="48" y2="82" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Level 4 from 80: dx=6, dy=14, slope=0.43 -->
  <line x1="80" y1="68" x2="74" y2="82" stroke="#fff" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="68" x2="86" y2="82" stroke="#fff" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>

  <!-- Level 4 from 106: single tip -->
  <line x1="106" y1="68" x2="100" y2="82" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>

  <!-- Level 5 from 14 (deepest): dx=6, dy=14, slope=0.43 -->
  <line x1="14" y1="82" x2="14" y2="96" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="14" y1="82" x2="22" y2="96" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Level 5 from 48: dx=6, dy=14, slope=0.43 -->
  <line x1="48" y1="82" x2="42" y2="96" stroke="#fff" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>
  <line x1="48" y1="82" x2="54" y2="96" stroke="#fff" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <!-- Level 5 from 86: single tip -->
  <line x1="86" y1="82" x2="82" y2="96" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  <line x1="86" y1="82" x2="92" y2="96" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.2"/>

  <!-- Level 6 tips from deepest left: dx=4, dy=12, slope=0.33 -->
  <line x1="14" y1="96" x2="18" y2="108" stroke="#fff" stroke-width="0.7" stroke-linecap="round" opacity="0.25"/>
  <line x1="22" y1="96" x2="26" y2="108" stroke="#fff" stroke-width="0.7" stroke-linecap="round" opacity="0.2"/>
</svg>
